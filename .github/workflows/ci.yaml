name: Continuous integration

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  ci:
    name: Continuous integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Jest
        uses: actions/cache@v4
        with:
          path: |
            .jest-cache
            coverage
          key: jest-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            jest-${{ runner.os }}-${{ github.ref }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests (bootstrap)
        env:
          NODE_ENV: test
          APPLICATION_MODE: bootstrap
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test

      - name: Test coverage (peer)
        env:
          NODE_ENV: test
          APPLICATION_MODE: peer
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test:coverage

      - name: Test coverage (bootstrap)
        env:
          NODE_ENV: test
          APPLICATION_MODE: bootstrap
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test:coverage

      - name: Unit tests (peer)
        env:
          NODE_ENV: test
          APPLICATION_MODE: peer
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test

      - name: E2E tests (bootstrap)
        env:
          NODE_ENV: test
          APPLICATION_MODE: bootstrap
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test:e2e

      - name: E2E tests (peer)
        env:
          NODE_ENV: test
          APPLICATION_MODE: peer
          JEST_CACHE_DIRECTORY: .jest-cache
        run: bun run test:e2e

      - name: Build
        run: bun run build
